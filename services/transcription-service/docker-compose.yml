services:
  # Nginx load balancer
  transcription-api:
    image: nginx:alpine
    container_name: transcription-lb
    ports:
      - "8083:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - transcription-worker-1
    restart: unless-stopped
    networks:
      transcription-net:
      vexa-network:
        aliases:
          - transcription-service

  # Worker 1 (GPU)
  transcription-worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transcription-worker-1
    environment:
      - WORKER_ID=1
      - MODEL_SIZE=${MODEL_SIZE:-large-v3-turbo}
      - DEVICE=cuda
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - VAD_MIN_SILENCE_DURATION_MS=80
    volumes:
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - transcription-net


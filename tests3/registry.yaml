# tests3 Registry — consolidated.
# Single source of truth for all automated evidence.
# Schema: each entry has `type:` (grep | http | env | script).
# Generated from tests3/checks/registry.json + tests3/test-registry.yaml
# by tests3/lib/migrate-registry.py. See tests3/README.md §3.3.

DASHBOARD_ADMIN_KEY_MATCHES:
  proves: "dashboard VEXA_ADMIN_API_KEY equals admin-api ADMIN_API_TOKEN \u2014 login will work"
  symptom: "Dashboard login fails silently \u2014 VEXA_ADMIN_API_KEY in dashboard differs from admin-api ADMIN_API_TOKEN"
  found: '2026-04-07'
  type: env
  env_checks:
  - service: dashboard
    var: VEXA_ADMIN_API_KEY
    not_empty: true
    equals:
      service: admin-api
      var: ADMIN_API_TOKEN
  modes:
  - lite
  - compose
  - helm
  state: stateless
  max_duration_sec: 10
DASHBOARD_ADMIN_KEY_VALID:
  proves: "dashboard can authenticate to admin-api \u2014 user lookup and login will work"
  symptom: "Dashboard shows empty pages \u2014 VEXA_ADMIN_API_KEY rejected by admin-api"
  found: '2026-04-07'
  type: env
  env_checks:
  - service: dashboard
    var: VEXA_ADMIN_API_KEY
    valid_against:
      url: $ADMIN_URL/admin/users?limit=1
      header: 'X-Admin-API-Key: $VALUE'
  modes:
  - lite
  - compose
  - helm
  state: stateless
  max_duration_sec: 10
DASHBOARD_API_KEY_VALID:

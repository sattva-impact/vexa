# ── DoD CHANGES ───────────────────────────────────────────────────────
# Do these DoD edits accurately describe what "done" means for webhooks?
dod_changes_approved:
  - feature: webhooks
    change: modify-evidence-and-label
    id: events-status-webhooks
    from:
      weight: 10
      evidence: {test: webhooks, step: e2e_status, modes: [compose]}
      label: >-
        Status-change webhooks fire when enabled via webhook_events
        (meeting.started / bot.failed / meeting.status_change)
    to:
      weight: 10
      evidence: {test: webhooks, step: e2e_status_non_completed, modes: [compose]}
      label: >-
        Status-change webhooks for non-meeting.completed events
        (meeting.started / meeting.status_change / bot.failed) fire
        when opted-in via webhook_events — proven by a delivery with
        event_type != meeting.completed, not by any entry in
        webhook_deliveries[].
    approved: true

# ── REGISTRY CHANGES ──────────────────────────────────────────────────
# New check IDs that scope.yaml references. Each must be approved here
# AND created in tests3/registry.yaml during develop.
registry_changes_approved:
  # Implementation detail corrected in develop: aggregate.py resolves
  # {check: X} bindings against smoke-* reports only; webhooks.sh
  # emits webhooks.json, so a standalone named check can't resolve.
  # Instead, we add a NEW STEP to the existing `webhooks:` script-type
  # registry entry. Bindings use {test: webhooks, step: e2e_status_non_completed}.
  - id: webhooks:e2e_status_non_completed
    change: add-step-to-existing-script-entry
    parent: webhooks          # the script-type registry entry in tests3/registry.yaml
    step: e2e_status_non_completed
    modes: [compose]
    rationale: |
      Tightens the status-webhook proof. Asserts that when
      webhook_events enables non-completed event types AND a bot
      lifecycle runs, meeting.data.webhook_deliveries[] contains
      ≥1 entry with event_type != meeting.completed. Existing
      e2e_status step (looser) stays as a sanity indicator; this
      step is the actual DoD binding.
    approved: true

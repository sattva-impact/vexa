# Release scope — the contract between the dev work and the validation.
#
# Created by `make release-plan ID=<id>` (or copy from this template).
# Drives every stage of the release cycle; see tests3/README.md.

release_id: REPLACE-WITH-YYMMDD-SLUG     # e.g. 260417-webhooks-dbpool
branch: dev                              # git branch the fixes live on
summary: |
  One-line summary. Expand with bullet points if helpful.

# Which deployments the release must prove out.
# Rule: if uncertain whether a mode is affected, include it.
deployments:
  modes: [lite, compose, helm]           # default: all three
  # If you drop one, note why:
  # notes:
  #   helm: "not applicable — fix is in deploy/compose only"

# Issues the release addresses. Each is a problem → hypothesis → fix → proof.
# Every issue MUST have at least one `proves:` binding; every deployment
# listed under `deployments:` must be covered by at least one binding.
issues:
  - id: EXAMPLE-issue-slug
    source: gh-issue         # gh-issue | human | internal | regression
    ref: "Vexa-ai/vexa#208"  # optional: GH issue URL/ID or human report ref
    problem: |
      Observable symptom, from the user's point of view. What breaks?
    hypothesis: |
      Root cause theory. What do we believe is actually happening?
    # REQUIRED when source: human  — why did the automated matrix miss this?
    # Must name the specific test/check absence (not "tests are flaky").
    gap_analysis: |
      e.g. "No test exercised the UI rollup path; webhook tests only verified
      backend DB state, never the /api/webhooks/deliveries route response."
    # REQUIRED when source: human  — IDs of checks / test steps that must
    # EXIST AND PASS before this issue is considered closed. The aggregator
    # blocks the gate unless each id shows up in this issue's `proves:` list.
    # This enforces: every human-found bug lands a regression check.
    new_checks: [DASHBOARD_WEBHOOKS_ALL_EVENT_TYPES]
    fix_commits: []          # git SHAs that implement the fix; grow as you commit
    # Each `proves:` entry binds the fix to a test artifact that would change
    # from fail → pass once the fix is correct. Use `{test, step, modes}` or
    # `{check, modes}`. Modes must be a subset of `deployments.modes`.
    proves:
      - {test: webhooks, step: e2e_status, modes: [compose]}
      - {check: DB_POOL_NO_EXHAUSTION, modes: [lite, compose, helm]}
    # Deployments that MUST go green for this issue before release ships.
    # If omitted, defaults to every mode listed in proves[].modes.
    required_modes: [compose]
    # Human verification steps for this fix — surfaced in the per-release
    # human-checklist.md alongside the static always-checks. Keep each item
    # a single action + an observable outcome (click X, see Y).
    # Templated: {vm_ip} / {node_ip} / {dashboard_url} substituted by the
    # human-checklist generator from tests3/.state-<mode>/.
    human_verify:
      - mode: compose
        do: "Configure a webhook via PUT /user/webhook (webhook_events: {meeting.completed: true, meeting.stopping: true})"
        expect: "meeting.data.webhook_deliveries contains >= 1 entry after a bot stop"

# Optional: expensive-tier tests to run during release-full (not release-iterate).
# These usually need external dependencies (Google Meet account, TTS, etc.).
# Leave empty to skip.
expensive_tests: []
  # - {test: meeting-tts, modes: [compose]}
  # - {test: post-meeting, modes: [compose]}

# Optional gate override — per-feature thresholds from features/*/README.md
# normally govern. List feature names here to require 100% for this release.
strict_features: []
  # - webhooks
  # - infrastructure

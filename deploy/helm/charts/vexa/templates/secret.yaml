{{- if not .Values.secrets.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vexa.componentName" (list . "secrets") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_API_TOKEN: {{ .Values.secrets.adminApiToken | quote }}
  TRANSCRIPTION_SERVICE_TOKEN: {{ .Values.secrets.transcriptionServiceToken | quote }}
  INTERNAL_API_SECRET: {{ .Values.secrets.internalApiSecret | default "vexa-internal-secret" | quote }}
  {{- if .Values.secrets.vexaApiKey }}
  VEXA_API_KEY: {{ .Values.secrets.vexaApiKey | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.credentialsSecretName | default "postgres-credentials" }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.database.name | quote }}
  POSTGRES_USER: {{ .Values.database.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.database.password | default "postgres" | quote }}
{{- end }}

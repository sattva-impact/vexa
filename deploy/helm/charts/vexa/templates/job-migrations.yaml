{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vexa.componentName" (list . "migrations") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrations
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          image: "{{ default .Values.meetingApi.image.repository .Values.migrations.image.repository }}:{{ default .Values.meetingApi.image.tag .Values.migrations.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Running idempotent schema sync..."
              python -c "import asyncio; from meeting_api.database import init_db; asyncio.run(init_db()); print('Schema sync complete.')"
          env:
            - name: DB_HOST
              value: {{ include "vexa.dbHost" . | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_NAME
              {{- if .Values.postgres.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecretName | quote }}
                  key: POSTGRES_DB
              {{- else }}
              value: {{ .Values.database.name | quote }}
              {{- end }}
            - name: DB_USER
              {{- if .Values.postgres.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecretName | quote }}
                  key: POSTGRES_USER
              {{- else }}
              value: {{ .Values.database.user | quote }}
              {{- end }}
            - name: DB_SSL_MODE
              value: {{ .Values.database.sslMode | quote }}
            - name: DB_PASSWORD
              {{- if .Values.postgres.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecretName | quote }}
                  key: POSTGRES_PASSWORD
              {{- else }}
              value: {{ .Values.database.password | quote }}
              {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}

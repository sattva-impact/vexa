# Vexa: build two images (vexa-bot + transcription-service), push to ECR, deploy via App Runner.
#
# Secrets (align with your API workflow naming):
#   AWS_ACCESS_KEY
#   AWS_SECRET_KEY
#   ECR_URI_BOT            — full ECR repo URI, no tag (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/vexa-bot)
#   ECR_URI_TRANSCRIPT
#   APP_RUNNER_DEV_ARN_BOT
#   APP_RUNNER_DEV_ARN_TRANSCRIPT
#   APP_RUNNER_PROD_ARN_BOT
#   APP_RUNNER_PROD_ARN_TRANSCRIPT

name: Vexa CI/CD

on:
  push:
    branches:
      - main
      - test/main
    tags:
      - "v*"

concurrency:
  group: vexa-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:   
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=dev" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push vexa-bot
        env:
          ECR_URI_BOT: ${{ secrets.ECR_URI_BOT }}
        run: |
          test -n "$ECR_URI_BOT" || (echo "Set secret ECR_URI_BOT" && exit 1)
          docker build --platform ${DOCKER_DEFAULT_PLATFORM} \
            -f services/vexa-bot/Dockerfile \
            -t "$ECR_URI_BOT:$IMAGE_TAG" \
            services/vexa-bot
          docker push "$ECR_URI_BOT:$IMAGE_TAG"

      - name: Build and push transcription-service
        env:
          ECR_URI_TRANSCRIPT: ${{ secrets.ECR_URI_TRANSCRIPT }}
        run: |
          test -n "$ECR_URI_TRANSCRIPT" || (echo "Set secret ECR_URI_TRANSCRIPT" && exit 1)
          docker build --platform ${DOCKER_DEFAULT_PLATFORM} \
            -f services/transcription-service/Dockerfile \
            -t "$ECR_URI_TRANSCRIPT:$IMAGE_TAG" \
            services/transcription-service
          docker push "$ECR_URI_TRANSCRIPT:$IMAGE_TAG"

  deploy:
    needs: build-and-push
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to App Runner
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            aws apprunner start-deployment \
              --service-arn "${{ secrets.APP_RUNNER_PROD_ARN_BOT }}" \
              --region "${{ env.AWS_REGION }}"
            aws apprunner start-deployment \
              --service-arn "${{ secrets.APP_RUNNER_PROD_ARN_TRANSCRIPT }}" \
              --region "${{ env.AWS_REGION }}"
          else
            aws apprunner start-deployment \
              --service-arn "${{ secrets.APP_RUNNER_DEV_ARN_BOT }}" \
              --region "${{ env.AWS_REGION }}"
            aws apprunner start-deployment \
              --service-arn "${{ secrets.APP_RUNNER_DEV_ARN_TRANSCRIPT }}" \
              --region "${{ env.AWS_REGION }}"
          fi

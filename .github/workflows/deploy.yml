name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-2

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------- BOT/AI ----------------
      - name: Build bot image
        run: |
          docker build -t bot-ai ./services/vexa-bot

      - name: Tag bot image
        run: |
          docker tag bot-ai:latest ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BOT }}:latest
          docker tag bot-ai:latest ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BOT }}:${{ github.sha }}

      - name: Push bot image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BOT }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BOT }}:${{ github.sha }}

      # ---------------- TRANSCRIPT ----------------
      - name: Build transcript image
        run: |
          docker build -t transcript-ai ./services/transcription-service

      - name: Tag transcript image
        run: |
          docker tag transcript-ai:latest ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_TRANSCRIPT }}:latest
          docker tag transcript-ai:latest ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_TRANSCRIPT }}:${{ github.sha }}

      - name: Push transcript image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_TRANSCRIPT }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_TRANSCRIPT }}:${{ github.sha }}
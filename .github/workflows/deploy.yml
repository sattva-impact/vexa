name: Vexa CI/CD

on:
  push:
    branches:
      - main
      - test/main
    tags:
      - "v*"
  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build and push? (true/false)'
        default: 'false'
        type: boolean

concurrency:
  group: vexa-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  build-and-push:
    # Runs on push OR if manual trigger has skip_build set to false
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.skip_build == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=dev" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          # Build Bot
          docker build --platform ${DOCKER_DEFAULT_PLATFORM} -f services/vexa-bot/Dockerfile -t "${{ secrets.ECR_URI_BOT }}:$IMAGE_TAG" services/vexa-bot
          docker push "${{ secrets.ECR_URI_BOT }}:$IMAGE_TAG"

          # Build Transcript
          docker build --platform ${DOCKER_DEFAULT_PLATFORM} -f services/transcription-service/Dockerfile -t "${{ secrets.ECR_URI_TRANSCRIPT }}:$IMAGE_TAG" services/transcription-service
          docker push "${{ secrets.ECR_URI_TRANSCRIPT }}:$IMAGE_TAG"

  deploy:
    # Runs if build succeeds OR if we manually skipped the build
    if: |
      always() &&
      (needs.build-and-push.result == 'success' || inputs.skip_build == true)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }} # Corrected from previous error
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to App Runner
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ARN_BOT="${{ secrets.APP_RUNNER_PROD_ARN_BOT }}"
            ARN_TRANS="${{ secrets.APP_RUNNER_PROD_ARN_TRANSCRIPT }}"
          else
            ARN_BOT="${{ secrets.APP_RUNNER_DEV_ARN_BOT }}"
            ARN_TRANS="${{ secrets.APP_RUNNER_DEV_ARN_TRANSCRIPT }}"
          fi

          aws apprunner start-deployment --service-arn "$ARN_BOT"
          aws apprunner start-deployment --service-arn "$ARN_TRANS"
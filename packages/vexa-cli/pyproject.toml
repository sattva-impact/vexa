[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "vexa-cli"
version = "0.1.0"
description = "Vexa CLI — local terminal client for the Vexa agent runtime"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.27",
    "rich>=13.0",
    "click>=8.0",
    "prompt_toolkit>=3.0",
]

[project.scripts]
vexa = "vexa_cli.main:cli"

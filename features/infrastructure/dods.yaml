gate:
  confidence_min: 100
dods:
- id: gateway-up
  label: API gateway responds to /admin/users via valid admin token
  weight: 10
  evidence:
    check: GATEWAY_UP
    modes:
    - lite
    - compose
    - helm
- id: admin-api-up
  label: admin-api responds with a valid list
  weight: 10
  evidence:
    check: ADMIN_API_UP
    modes:
    - lite
    - compose
    - helm
- id: dashboard-up
  label: dashboard root page responds
  weight: 10
  evidence:
    check: DASHBOARD_UP
    modes:
    - lite
    - compose
    - helm
- id: runtime-api-up
  label: runtime-api (bot orchestrator) is reachable / has ready replicas
  weight: 15
  evidence:
    check: RUNTIME_API_UP
    modes:
    - lite
    - compose
    - helm
- id: transcription-up
  label: transcription service /health returns ok + gpu_available
  weight: 15
  evidence:
    check: TRANSCRIPTION_UP
    modes:
    - lite
    - compose
    - helm
- id: redis-up
  label: Redis responds to PING
  weight: 10
  evidence:
    check: REDIS_UP
    modes:
    - lite
    - compose
    - helm
- id: minio-up
  label: MinIO is healthy / has ready replicas
  weight: 10
  evidence:
    check: MINIO_UP
    modes:
    - compose
    - helm
- id: db-schema
  label: Database schema is aligned with the current model
  weight: 10
  evidence:
    check: DB_SCHEMA_ALIGNED
    modes:
    - lite
    - compose
    - helm
- id: gateway-timeout
  label: "Gateway proxy timeout is \u226530s (prevents premature 504s under load)"
  weight: 10
  evidence:
    check: GATEWAY_TIMEOUT_ADEQUATE
    modes:
    - lite
    - compose
    - helm
# The five DoDs below are static chart-hygiene greps against files under
# deploy/helm/charts/vexa/. The grepped files are mode-independent — the
# check outcome is identical whether run from a lite VM or an LKE pod —
# so one mode's evidence is canonical. `helm` is the chosen canonical
# because these DoDs describe chart contracts, and helm is the mode the
# chart is designed for. Widened in a future cycle only if we need
# per-mode rollup for a specific regression.
# (Narrowed from [lite, compose, helm] 2026-04-19 per 260419-helm triage.)
- id: chart-resources-tuned
  label: "every enabled service in values.yaml declares resources.requests + resources.limits for both cpu and memory"
  weight: 10
  evidence:
    check: HELM_VALUES_RESOURCES_SET
    modes:
    - helm
- id: chart-security-hardened
  label: "global.securityContext sets allowPrivilegeEscalation: false and drops ALL capabilities"
  weight: 10
  evidence:
    check: HELM_GLOBAL_SECURITY_HARDENED
    modes:
    - helm
- id: chart-redis-tuned
  label: "redis deployment args include --maxmemory and an eviction policy"
  weight: 10
  evidence:
    check: HELM_REDIS_MAXMEMORY_SET
    modes:
    - helm
- id: chart-db-pool-tuned
  label: "meeting-api env sets DB_POOL_SIZE (pool sizing is an explicit, reviewed choice)"
  weight: 10
  evidence:
    check: HELM_MEETING_API_DB_POOL_TUNED
    modes:
    - helm
- id: chart-pdb-available
  label: "PodDisruptionBudget template exists in chart (off by default via values toggle; on when podDisruptionBudgets.<svc>.enabled=true)"
  weight: 10
  evidence:
    check: HELM_PDB_TEMPLATE_EXISTS
    modes:
    - helm
